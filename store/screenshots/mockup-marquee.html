<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shortless — Marquee Promo Tile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1400px;
    height: 560px;
    overflow: hidden;
    background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 35%, #16213e 70%, #0f0f1e 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 25% 50%, rgba(46,117,182,0.1) 0%, transparent 70%),
      radial-gradient(ellipse 500px 300px at 80% 40%, rgba(46,117,182,0.07) 0%, transparent 70%);
  }

  .layout {
    display: flex;
    align-items: center;
    gap: 80px;
    position: relative;
    z-index: 1;
    padding: 0 100px;
    width: 100%;
  }

  /* Left — branding + text */
  .text-side {
    flex: 1;
  }

  .text-side h1 {
    font-size: 64px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -2px;
    line-height: 1.05;
    margin-bottom: 16px;
  }

  .text-side h1 span {
    color: #2E75B6;
  }

  .tagline {
    font-size: 22px;
    color: #999;
    line-height: 1.5;
    margin-bottom: 36px;
    max-width: 480px;
  }

  .pills {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    background: rgba(46,117,182,0.1);
    border: 1px solid rgba(46,117,182,0.2);
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    color: #2E75B6;
  }

  .pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #2E75B6;
  }

  /* Right — platform icons grid */
  .platforms-side {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    flex-shrink: 0;
  }

  .plat-card {
    width: 180px;
    height: 120px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .plat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 25%;
    right: 25%;
    height: 2px;
    border-radius: 2px;
  }

  .plat-card:nth-child(1)::before { background: #ff0000; }
  .plat-card:nth-child(2)::before { background: linear-gradient(90deg, #f09433, #dc2743, #bc1888); }
  .plat-card:nth-child(3)::before { background: #00f2ea; }
  .plat-card:nth-child(4)::before { background: #fffc00; }

  .plat-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .plat-card:nth-child(1) .plat-icon { background: linear-gradient(135deg, #ff0000, #cc0000); }
  .plat-card:nth-child(2) .plat-icon { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .plat-card:nth-child(3) .plat-icon { background: linear-gradient(135deg, #00f2ea, #ff0050); }
  .plat-card:nth-child(4) .plat-icon { background: linear-gradient(135deg, #fffc00, #ff6600); }

  .plat-icon svg {
    width: 22px;
    height: 22px;
    fill: #fff;
  }

  .plat-name {
    font-size: 14px;
    font-weight: 600;
    color: #e0e0e0;
  }

  /* Shield overlay on each card */
  .shield-check {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 20px;
    height: 20px;
    color: #2E75B6;
  }
</style>
</head>
<body>
  <div class="layout">
    <div class="text-side">
      <h1><span>Shortless</span></h1>
      <p class="tagline">Block the Scroll. Keep the Content.<br>Surgically remove short-form video from 4 platforms.</p>
      <div class="pills">
        <div class="pill"><span class="dot"></span> Zero Data Collection</div>
        <div class="pill"><span class="dot"></span> 3-Layer Defense</div>
        <div class="pill"><span class="dot"></span> Per-Platform Control</div>
      </div>
    </div>

    <div class="platforms-side">
      <!-- YouTube -->
      <div class="plat-card">

        <div class="plat-icon">

        <div class="plat-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2.2c3.2 0 3.6 0 4.8.1 1.2.1 1.8.2 2.2.4.6.2 1 .5 1.4.9.4.4.7.8.9 1.4.2.4.4 1.1.4 2.2.1 1.3.1 1.6.1 4.8s0 3.6-.1 4.8c-.1 1.2-.2 1.8-.4 2.2-.2.6-.5 1-.9 1.4-.4.4-.8.7-1.4.9-.4.2-1.1.4-2.2.4-1.3.1-1.6.1-4.8.1s-3.6 0-4.8-.1c-1.2-.1-1.8-.2-2.2-.4-.6-.2-1-.5-1.4-.9-.4-.4-.7-.8-.9-1.4-.2-.4-.4-1.1-.4-2.2-.1-1.3-.1-1.6-.1-4.8s0-3.6.1-4.8c.1-1.2.2-1.8.4-2.2.2-.6.5-1 .9-1.4.4-.4.8-.7 1.4-.9.4-.2 1.1-.4 2.2-.4 1.2-.1 1.6-.1 4.8-.1M12 0C8.7 0 8.3 0 7.1.1 5.8.1 4.9.3 4.1.6c-.8.3-1.5.7-2.2 1.4C1.3 2.6.9 3.3.6 4.1.3 4.9.1 5.8.1 7.1 0 8.3 0 8.7 0 12s0 3.7.1 4.9c.1 1.3.2 2.2.5 2.9.3.8.7 1.5 1.4 2.2.7.7 1.4 1.1 2.2 1.4.8.3 1.6.5 2.9.5C8.3 24 8.7 24 12 24s3.7 0 4.9-.1c1.3-.1 2.2-.2 2.9-.5.8-.3 1.5-.7 2.2-1.4.7-.7 1.1-1.4 1.4-2.2.3-.8.5-1.6.5-2.9.1-1.2.1-1.6.1-4.9s0-3.7-.1-4.9c-.1-1.3-.2-2.2-.5-2.9-.3-.8-.7-1.5-1.4-2.2C21.4 1.3 20.7.9 19.9.6c-.8-.3-1.6-.5-2.9-.5C15.7 0 15.3 0 12 0zm0 5.8a6.2 6.2 0 100 12.4 6.2 6.2 0 000-12.4zM12 16a4 4 0 110-8 4 4 0 010 8zm6.4-10.8a1.4 1.4 0 100 2.8 1.4 1.4 0 000-2.8z"/></svg>
        </div>
        <span class="plat-name">Instagram</span>
      </div>

      <!-- TikTok -->
      <div class="plat-card">
        <svg class="shield-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
        <div class="plat-icon">
          <svg viewBox="0 0 24 24"><path d="M19.3 5.1c-1.2-.7-2-1.9-2.3-3.2 0-.3-.1-.6-.1-.9h-3.7v14.1c0 1.7-1.4 3.1-3.1 3.1s-3.1-1.4-3.1-3.1 1.4-3.1 3.1-3.1c.3 0 .7.1 1 .2V8.3c-.3 0-.7-.1-1-.1-3.8 0-6.9 3.1-6.9 6.9s3.1 6.9 6.9 6.9 6.9-3.1 6.9-6.9V9.7c1.4 1 3.1 1.5 4.8 1.5V7.5c-.9 0-1.8-.3-2.5-.8V5.1z"/></svg>
        </div>
        <span class="plat-name">TikTok</span>
      </div>

      <!-- Snapchat -->
      <div class="plat-card">
        <svg class="shield-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
        <div class="plat-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12c0 2.3.8 4.5 2.2 6.2.1.1.2.3.2.5 0 .3-.1.6-.3.9-.3.5-.7.9-1.1 1.2-.2.2-.1.5.1.6.1 0 .2.1.3.1.8 0 1.7-.3 2.4-.7.4-.2.8-.3 1.2-.3.3 0 .6.1.9.2 1.1.5 2.3.7 3.5.7 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
        </div>
        <span class="plat-name">Snapchat</span>
      </div>
    </div>
  </div>
</body>
</html>
