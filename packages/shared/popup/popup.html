<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'">
  <meta name="viewport" content="width=320">
  <title>Shortless</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="title-row">
        <h1 class="title">Shortless</h1>
        <span class="version"></span>
      </div>
      <p class="tagline">Block the Scroll. Keep the Content.</p>
    </header>

    <main class="platforms">
      <div class="platform-card" data-platform="youtube">
        <span class="platform-name">YouTube</span>
        <label class="toggle">
          <input type="checkbox" checked aria-label="Toggle YouTube blocking">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="platform-card" data-platform="instagram">
        <span class="platform-name">Instagram</span>
        <label class="toggle">
          <input type="checkbox" checked aria-label="Toggle Instagram blocking">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="platform-card" data-platform="tiktok">
        <span class="platform-name">TikTok</span>
        <label class="toggle">
          <input type="checkbox" checked aria-label="Toggle TikTok blocking">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="platform-card" data-platform="snapchat">
        <span class="platform-name">Snapchat</span>
        <label class="toggle">
          <input type="checkbox" checked aria-label="Toggle Snapchat blocking">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </main>

    <footer class="footer">
      <p class="block-count">Focus time protected: <strong id="block-count">0</strong> blocks today</p>
      <a href="#" id="report-breakage" class="report-link">Report breakage</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
